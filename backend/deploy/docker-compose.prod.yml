# Optional: Postgres on the same server (dev/staging only).
# Production: use Amazon RDS and set DB_* env on the app service.

services:
  api:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ../.env
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me}
      POSTGRES_DB: sugarbf
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
