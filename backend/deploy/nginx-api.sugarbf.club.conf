# Nginx reverse proxy for Sugar BF API
# Install path on EC2: /etc/nginx/sites-available/api.sugarbf.club
#
# After certbot, HTTPS is enabled automatically.

server {
    listen 80;
    listen [::]:80;
    server_name api.sugarbf.club;

    # Certbot will add ACME challenge + redirect to HTTPS here

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Socket.IO / WebSocket (chat realtime)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    client_max_body_size 20M;
}
